<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My STORELANDIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
    <link rel="stylesheet" href="../static/css/login.css">
  </head>
  <body>

<header class="container-fluid d-flex justify-content-center py-4" id="header1">
  <h1 class="display-4 fw-bold" id="first-h1">STORELANDIA</h1>
</header>

<main class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4" id="register-card">
      <h1 class="text-center mb-4" id="register-auth">Register</h1>
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="register-email" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label for="register-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="register-password" placeholder="Enter your password">
            <span class="input-group-text" style="cursor: pointer;" id="togglePasswordRegister">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>

        <div class="mb-3">
          <label for="confirm-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="confirm-password" placeholder="Confirm your password">
            </span>
          </div>
        </div>

        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <div class="input-group">
          <select class="form-control" name="role" id="role-form">
            <option value="customer">Customer</option>
            <option value="seller">Seller</option>
        </select>
        </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="register-btn">Register</button>
        <p class="mt-3 text-center">Have an account? <a href="#" id="sign-in-option">Sign in</a></p>
        </div>
      </form>
    </div>
  </div>
</main>

<main class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4" id="login-card">
      <h1 class="text-center mb-4" id="login-auth">Login</h1>
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Username</label>
          <input type="email" class="form-control" id="login-email-username" placeholder="Email or username">
        </div>
        
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="login-password" placeholder="Enter your password">
            <span class="input-group-text" style="cursor: pointer;" id="togglePasswordLogin">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="login-btn">Login</button>
        <p class="mt-3 text-center">Don't have an account? <a href="#" id="sign-up-option">Sign up</a></p>
      </form>
    </div>
  </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="../static/js/login.js"></script>
  </body>
</html>
